<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(to right,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:20px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#141e30;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
}

.success{
    background:#d4edda;
    color:#155724;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    text-align:center;
}

</style>

</head>

<body>

<div class="box">

<h1>🔐 Login</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="success">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<a href="/register">
Create Account
</a>

</div>

</body>

</html>
